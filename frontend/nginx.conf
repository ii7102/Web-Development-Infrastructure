server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The runtime config and the HTML entrypoint must never be cached, otherwise
    # browsers keep stale config / point at an old JS bundle after a redeploy.
    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
