# ---------------------------------------------------------------------------
# Starter stack: postgres + keycloak + backend + frontend + nginx gateway
#
# A single nginx gateway is the only public entrypoint (APP_PUBLIC_BASE_URL).
# It routes one origin to every service so cookies / CORS / OIDC redirect URIs
# and the token issuer all line up:
#   /       -> frontend (SPA)
#   /api/   -> backend
#   /auth/  -> keycloak
#
# Boot order (enforced via healthchecks):
#   postgres --> keycloak --> backend --> frontend --> gateway
# ---------------------------------------------------------------------------

name: ${COMPOSE_PROJECT_NAME:-application}

networks:
  app-net:
    driver: bridge
  app-db-net:
    driver: bridge
  kc-db-net:
    driver: bridge

volumes:
  app-db-data:
  kc-db-data:

services:

  # =======================================================================
  # 1. PostgreSQL databases for application and keycloak
  # =======================================================================

  app-db:
    image: postgres:18.4
    container_name: app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_DB:       ${APP_DB_NAME}
    volumes:
      - app-db-data:/var/lib/postgresql
    networks:
      - app-db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER} -d ${APP_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  kc-db:
    image: postgres:18.4
    container_name: kc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
      POSTGRES_DB:       ${KC_DB_NAME}
    volumes:
      - kc-db-data:/var/lib/postgresql
    networks:
      - kc-db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER} -d ${KC_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # =======================================================================
  # 2. Keycloak
  # =======================================================================

  keycloak:
    build:
      context: ./infra/keycloak
      dockerfile: Dockerfile
    container_name: keycloak
    restart: unless-stopped
    command: ["start", "--optimized", "--import-realm"]
    depends_on:
      kc-db:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}

      KC_DB_URL: jdbc:postgresql://kc-db:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}

      KC_HOSTNAME: ${APP_PUBLIC_BASE_URL}/auth
      KC_HTTP_ENABLED: true
      KC_PROXY_HEADERS: xforwarded

      KC_CACHE: local

      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_SSL_REQUIRED: ${KEYCLOAK_SSL_REQUIRED:-external}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID}
      KEYCLOAK_BACKEND_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
      KEYCLOAK_FRONTEND_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL}
    networks:
      - app-net
      - kc-db-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /auth/health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =======================================================================
  # 3. Backend  -- Spring Boot 3 / Java 21.
  # =======================================================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      app-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL}
      SPRING_DATASOURCE_URL: jdbc:postgresql://app-db:5432/${APP_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${APP_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD}

      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${APP_PUBLIC_BASE_URL}/auth/realms/${KEYCLOAK_REALM}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs

      KEYCLOAK_INTERNAL_BASE_URL: http://keycloak:8080/auth
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID}
      KEYCLOAK_BACKEND_CLIENT_SECRET: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
      PAYMENTS_PROVIDER: ${PAYMENTS_PROVIDER:-none}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

      CORS_ALLOWED_ORIGINS: ${APP_PUBLIC_BASE_URL}
    networks:
      - app-net
      - app-db-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # =======================================================================
  # 4. Frontend  -- React 19
  # =======================================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_FRONTEND_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID}
      PAYMENTS_PROVIDER: ${PAYMENTS_PROVIDER:-none}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    networks:
      - app-net

  # =======================================================================
  # 5. Gateway  -- nginx reverse proxy; the single public entrypoint.
  # =======================================================================

  gateway:
    image: nginx:stable-alpine
    container_name: gateway
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-net
