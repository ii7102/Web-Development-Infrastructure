# nginx gateway: the single public entrypoint for the whole stack.
# Everything is served from one origin (APP_PUBLIC_BASE_URL) so cookies,
# CORS, OIDC redirect URIs and the token issuer all line up.
#
# Upstreams are Docker service names resolved on the shared `app-net` network.
# NOTE: nginx resolves these names once at startup. If you recreate a backing
# container (new IP), restart the gateway too: `docker compose restart gateway`.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # ---- Keycloak (served under /auth via KC_HTTP_RELATIVE_PATH=/auth) ----
    location /auth/ {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # Keycloak emits large headers/cookies.
        proxy_buffer_size 16k;
        proxy_buffers     8 16k;
    }

    # ---- Backend API (prefix preserved; map controllers under /api) ----
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket support (e.g. STOMP / SockJS).
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---- Frontend SPA ----
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
