spring.application.name=backend

# Actuator: /actuator/health is used by the compose healthcheck. Keep it open.
# NOTE: if you later add Spring Security, permit /actuator/health explicitly or
# the container healthcheck will start failing.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Flyway runs on startup against the SPRING_DATASOURCE_* connection (passed by
# compose). No migrations ship with the template -- add yours under
# src/main/resources/db/migration as V<n>__description.sql. With no scripts present
# Flyway is a no-op. baseline-on-migrate lets it adopt a non-empty existing DB.
spring.flyway.baseline-on-migrate=true
